name: "Unravel PR"
description: "Analyze PR diffs with Unravel and post a walkthrough as a PR comment"
branding:
  icon: "git-pull-request"
  color: "purple"

inputs:
  api-key:
    description: "LLM API key (e.g. Anthropic API key)"
    required: true
  provider:
    description: "LLM provider (default: anthropic)"
    required: false
    default: ""
  model:
    description: "Model to use (default: provider default)"
    required: false
    default: ""
  github-token:
    description: "GitHub token for posting comments (default: github.token)"
    required: false
    default: ${{ github.token }}

runs:
  using: "composite"
  steps:
    - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
      with:
        python-version: "3.12"

    - name: Install unravel
      shell: bash
      env:
        ACTION_REPOSITORY: ${{ github.action_repository }}
        ACTION_REF: ${{ github.action_ref }}
      run: |
        uv pip install "git+https://github.com/${ACTION_REPOSITORY}.git@${ACTION_REF}"

    - name: Run analysis and generate comment
      shell: bash
      run: |
        args=(pr "${REPO}#${PR_NUMBER}" --github-comment --no-tui --no-cache)
        [ -n "$MODEL" ]    && args+=(--model "$MODEL")
        [ -n "$PROVIDER" ] && args+=(--provider "$PROVIDER")
        unravel "${args[@]}" > "$RUNNER_TEMP/unravel-comment.md"
      env:
        REPO: ${{ github.repository }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        UNRAVEL_API_KEY: ${{ inputs.api-key }}
        GH_TOKEN: ${{ inputs.github-token }}
        MODEL: ${{ inputs.model }}
        PROVIDER: ${{ inputs.provider }}

    - name: Post PR comment
      shell: bash
      run: |
        gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" \
          -F "body=@${RUNNER_TEMP}/unravel-comment.md"
      env:
        REPO: ${{ github.repository }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        GH_TOKEN: ${{ inputs.github-token }}
